name: CI — Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-client:
    name: 🖥️ Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Build production bundle
        working-directory: client
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 7

  verify-server:
    name: ⚙️ Verify Backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: server
        run: npm ci

      - name: Verify server starts
        working-directory: server
        env:
          PORT: 5000
          MONGODB_URI: mongodb://localhost:27017/forensicai_test
          JWT_SECRET: ci-test-secret-key-not-for-production
          AI_PROVIDER: openai
          AI_API_KEY: sk-test-not-real
          AI_MODEL: gpt-4
          AI_TEMPERATURE: 0.3
          AI_MAX_TOKENS: 2048
          UPLOAD_DIR: ./uploads
          MAX_FILE_SIZE: 5368709120
        run: |
          timeout 5 node server.js || EXIT_CODE=$?
          if [ "${EXIT_CODE}" = "124" ]; then
            echo "✅ Server started successfully (timed out as expected)"
          else
            echo "⚠️ Server exited with code ${EXIT_CODE}"
          fi
