<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Core Metallic Gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="50%" stop-color="#7b61ff" />
      <stop offset="100%" stop-color="#ff6b6b" />
    </linearGradient>

    <!-- Glowing Accent Gradient -->
    <linearGradient id="cyanGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7b61ff" />
    </linearGradient>

    <!-- Deep Shield Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141424" />
      <stop offset="100%" stop-color="#07070c" />
    </linearGradient>

    <!-- Glow Effect Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Light Glow for Sub-components -->
    <filter id="lightGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle Digital Grid Pattern -->
    <pattern id="digitalGrid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="rgba(0, 212, 255, 0.04)" stroke-width="1" />
      <circle cx="24" cy="24" r="1" fill="rgba(0, 212, 255, 0.1)" />
    </pattern>
  </defs>

  <!-- Background Glow Aura -->
  <path d="M256 35 L430 95 C430 290 360 415 256 480 C152 415 82 290 82 95 Z" 
        fill="rgba(123, 97, 255, 0.15)" 
        filter="url(#glow)" />

  <!-- Outer Shield Boundary (Glowing Stroke) -->
  <path d="M256 35 L430 95 C430 290 360 415 256 480 C152 415 82 290 82 95 Z" 
        fill="url(#bgGrad)" 
        stroke="url(#shieldGrad)" 
        stroke-width="14" 
        stroke-linejoin="round" 
        filter="url(#lightGlow)" />

  <!-- Inner Shield (Secondary Border) -->
  <path d="M256 55 L412 108 C412 277 350 388 256 450 C162 388 100 277 100 108 Z" 
        fill="url(#digitalGrid)" 
        stroke="rgba(0, 212, 255, 0.15)" 
        stroke-width="3" 
        stroke-linejoin="round" />

  <!-- Cybersecurity Circuit Nodes & Paths -->
  <g opacity="0.8">
    <!-- Left Trace -->
    <path d="M 140 180 L 180 180 L 210 210" fill="none" stroke="rgba(0, 212, 255, 0.4)" stroke-width="4" stroke-linecap="round" />
    <circle cx="140" cy="180" r="5" fill="#00d4ff" />
    
    <!-- Right Trace -->
    <path d="M 372 180 L 332 180 L 302 210" fill="none" stroke="rgba(123, 97, 255, 0.4)" stroke-width="4" stroke-linecap="round" />
    <circle cx="372" cy="180" r="5" fill="#7b61ff" />

    <!-- Bottom Connectors -->
    <path d="M 210 370 L 256 416 L 302 370" fill="none" stroke="rgba(0, 212, 255, 0.3)" stroke-width="4" stroke-linecap="round" />
    <circle cx="210" cy="370" r="5" fill="#00d4ff" />
    <circle cx="302" cy="370" r="5" fill="#7b61ff" />
    <circle cx="256" cy="416" r="6" fill="#00e676" filter="url(#lightGlow)" />
  </g>

  <!-- Central Futuristic 'F' Circuit Logo -->
  <g filter="url(#glow)">
    <!-- Circuit Lines (F Shape) -->
    <path d="M 216 330 L 216 182 L 320 182" fill="none" stroke="url(#cyanGlow)" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M 216 254 L 290 254" fill="none" stroke="url(#cyanGlow)" stroke-width="16" stroke-linecap="round" />

    <!-- AI Core Node Circles -->
    <!-- Top-Right F Tip -->
    <circle cx="320" cy="182" r="14" fill="#00f0ff" stroke="#0a0a0f" stroke-width="4" />
    <!-- Middle F Tip -->
    <circle cx="290" cy="254" r="14" fill="#7b61ff" stroke="#0a0a0f" stroke-width="4" />
    <!-- Bottom F Stem Node -->
    <circle cx="216" cy="330" r="14" fill="#00f0ff" stroke="#0a0a0f" stroke-width="4" />
    
    <!-- Pulse Center Core -->
    <circle cx="216" cy="182" r="7" fill="#ffffff" />
  </g>

  <!-- Accent Cybernetic Details -->
  <!-- Top Center Anchor Node -->
  <circle cx="256" cy="72" r="5" fill="#00d4ff" filter="url(#lightGlow)" />
  <line x1="256" y1="35" x2="256" y2="67" stroke="rgba(0, 212, 255, 0.5)" stroke-width="3" />
</svg>
